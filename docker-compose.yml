services:
  kavanin-parser:
    container_name: parser
    image: kavanin-parser
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped
    networks:
      - kavanin-network

networks:
  kavanin-network:
    driver: bridge
